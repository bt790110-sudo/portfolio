<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page not found</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0b1120;
        color: #eaf0f7;
        font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .code { color: #f5a623; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; }
      h1 { font-size: 4rem; margin: 0.4em 0 0.2em; }
      p { color: #92a2b8; margin: 0 0 1.5em; }
      a {
        color: #0b1120;
        background: #4fd1c5;
        padding: 0.75em 1.5em;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="code">HTTP 404</div>
      <h1>Route not found</h1>
      <p>This page doesn't exist. Let's get you back on track.</p>
      <a href="./">Return home</a>
    </div>
  </body>
</html>
